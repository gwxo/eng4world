<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darbhanga Sikho | Voice Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #0b1120; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .room-card { background: #1e293b; border-radius: 24px; transition: all 0.3s ease; border: 1px solid #334155; }
        .room-card:hover { transform: translateY(-5px); border-color: #6366f1; box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.5); }
        .pulse-mic { animation: pulse-blue 2s infinite; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(99, 102, 241, 0); } 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); } }
        .avatar-circle { width: 60px; height: 60px; border-radius: 50%; background: #0f172a; border: 2px solid #334155; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; border-radius: 24px; transform: scaleX(-1); }
    </style>
</head>
<body>

    <!-- Nav -->
    <nav class="sticky top-0 z-50 glass py-4 px-6 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="p-2 bg-indigo-600 rounded-lg shadow-lg shadow-indigo-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" /></svg>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tighter">DARBHANGA <span class="text-indigo-400">SIKHO</span></h1>
        </div>
        <div class="hidden md:flex gap-4">
            <span class="text-xs font-bold text-green-400 bg-green-400/10 px-4 py-2 rounded-full border border-green-400/20">● LIVE SYSTEM</span>
        </div>
    </nav>

    <!-- Main Dashboard -->
    <main class="max-w-6xl mx-auto p-6 lg:p-12">
        <div class="text-center mb-12">
            <h2 class="text-4xl md:text-5xl font-black mb-4">Master English Together.</h2>
            <p class="text-slate-400 text-lg">Create a room or jump into one. Mic-first, privacy-focused.</p>
        </div>

        <!-- Create Section -->
        <div class="max-w-xl mx-auto glass p-2 rounded-3xl mb-16 flex gap-2">
            <input id="room-topic" type="text" placeholder="Room Topic: IELTS, Daily Life, Career..." 
                   class="bg-transparent flex-1 px-6 py-3 outline-none font-medium text-white">
            <button id="create-room-btn" class="bg-indigo-600 hover:bg-indigo-500 px-8 py-3 rounded-2xl font-bold transition-all shadow-lg shadow-indigo-600/20">
                Create Room
            </button>
        </div>

        <!-- Dynamic Room Grid -->
        <div class="flex items-center gap-4 mb-8">
            <h3 class="text-xl font-bold">Active Voice Hotspots</h3>
            <div class="h-px flex-1 bg-white/10"></div>
        </div>

        <div id="room-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Dynamically injected from Firebase -->
        </div>
    </main>

    <!-- CALL INTERFACE (FULL SCREEN) -->
    <div id="call-interface" class="fixed inset-0 z-[100] hidden bg-[#070b14] flex flex-col items-center justify-center p-6">
        <div class="absolute top-8 left-8 flex items-center gap-4">
            <div class="glass px-6 py-3 rounded-2xl">
                <p id="ui-topic" class="font-bold text-indigo-400 uppercase tracking-widest text-xs">TOPIC</p>
                <h4 class="text-xl font-black">Voice Session</h4>
            </div>
        </div>

        <button id="leave-btn" class="absolute top-8 right-8 bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-6 py-3 rounded-2xl border border-red-500/50 font-bold transition-all">
            Leave Group
        </button>

        <div class="flex flex-col md:flex-row items-center gap-12">
            <!-- User Local -->
            <div class="text-center">
                <div id="local-container" class="w-48 h-48 md:w-64 md:h-64 rounded-[3rem] bg-slate-800 border-4 border-indigo-500/50 relative overflow-hidden flex items-center justify-center pulse-mic">
                    <img id="local-avatar" src="" class="w-full h-full object-cover" />
                    <video id="localVideo" class="hidden absolute inset-0" autoplay playsinline muted></video>
                </div>
                <p class="mt-4 font-bold text-slate-400">YOU (Microphone On)</p>
            </div>

            <div class="text-4xl font-black text-white/10 italic">VS</div>

            <!-- User Remote -->
            <div class="text-center">
                <div id="remote-container" class="w-48 h-48 md:w-64 md:h-64 rounded-[3rem] bg-slate-800 border-4 border-slate-700 relative overflow-hidden flex items-center justify-center">
                    <img id="remote-avatar" src="" class="w-full h-full object-cover" />
                    <video id="remoteVideo" class="hidden absolute inset-0" autoplay playsinline></video>
                    <div id="partner-waiting" class="text-slate-500 text-xs font-bold uppercase tracking-widest px-4 text-center">Waiting for someone...</div>
                </div>
                <p class="mt-4 font-bold text-slate-400">PARTNER</p>
            </div>
        </div>

        <!-- Controls -->
        <div class="mt-16 flex gap-6">
            <button id="toggle-video" class="w-16 h-16 glass rounded-2xl flex items-center justify-center text-slate-400 hover:text-white transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
            </button>
        </div>
    </div>

    <!-- Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, updateDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIG (Replace with your actual keys)
        const firebaseConfig = {
  apiKey: "AIzaSyAKlo2eBKCQAeC3PkRz45ntdhYjH9YS3cE",
  authDomain: "eng4world-f78a2.firebaseapp.com",
  databaseURL: "https://eng4world-f78a2-default-rtdb.firebaseio.com",
  projectId: "eng4world-f78a2",
  storageBucket: "eng4world-f78a2.firebasestorage.app",
  messagingSenderId: "914297244703",
  appId: "1:914297244703:web:4f6530b891dfc06fb9192a"
};

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };
        let pc = new RTCPeerConnection(servers);
        let localStream = null;

        // Generate 2D Avatar URL based on a string
        const getAvatar = (seed) => `https://api.dicebear.com/7.x/avataaars/svg?seed=${seed}`;

        // Dashboard Live Sync
        onSnapshot(collection(db, 'calls'), (snapshot) => {
            const grid = document.getElementById('room-grid');
            grid.innerHTML = '';
            snapshot.forEach((doc) => {
                const data = doc.data();
                if (data.answer) return; // Only show rooms with 1 person

                const roomCard = document.createElement('div');
                roomCard.className = "room-card p-8 flex flex-col justify-between";
                roomCard.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-6">
                            <span class="text-xs font-black text-indigo-400 bg-indigo-400/10 px-3 py-1 rounded-full uppercase">1/2 Slots</span>
                            <div class="flex -space-x-4">
                                <div class="avatar-circle"><img src="${getAvatar(doc.id)}"></div>
                                <div class="avatar-circle border-dashed opacity-20"></div>
                            </div>
                        </div>
                        <h4 class="text-xl font-bold mb-2">${data.topic || 'General Practice'}</h4>
                        <p class="text-slate-500 text-sm mb-8">Join this conversation to practice English speaking.</p>
                    </div>
                    <button onclick="joinRoom('${doc.id}')" class="w-full bg-slate-900 hover:bg-indigo-600 py-4 rounded-2xl font-bold transition-all border border-white/5">
                        Join Voice Group
                    </button>
                `;
                grid.appendChild(roomCard);
            });
        });

        async function initMicOnly() {
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            // Initial state: Camera OFF, Mic ON
            localStream.getVideoTracks()[0].enabled = false;
            
            const remoteStream = new MediaStream();
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            
            pc.ontrack = (event) => {
                event.streams[0].getTracks().forEach(track => {
                    remoteStream.addTrack(track);
                    if (track.kind === 'video') {
                        document.getElementById('remoteVideo').classList.remove('hidden');
                        document.getElementById('partner-waiting').classList.add('hidden');
                    }
                });
            };
            document.getElementById('localVideo').srcObject = localStream;
            document.getElementById('remoteVideo').srcObject = remoteStream;
            document.getElementById('local-avatar').src = getAvatar(Math.random());
        }

        // CREATE ROOM ACTION
        document.getElementById('create-room-btn').onclick = async () => {
            const topic = document.getElementById('room-topic').value || "English Practice";
            await initMicOnly();
            document.getElementById('call-interface').classList.remove('hidden');
            document.getElementById('ui-topic').innerText = topic;

            const callDoc = doc(collection(db, 'calls'));
            const offerCandidates = collection(callDoc, 'offerCandidates');
            const answerCandidates = collection(callDoc, 'answerCandidates');

            pc.onicecandidate = (e) => e.candidate && addDoc(offerCandidates, e.candidate.toJSON());

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            await setDoc(callDoc, { topic, offer: { type: offer.type, sdp: offer.sdp } });

            onSnapshot(callDoc, (s) => {
                const d = s.data();
                if (!pc.currentRemoteDescription && d?.answer) {
                    pc.setRemoteDescription(new RTCSessionDescription(d.answer));
                }
            });

            onSnapshot(answerCandidates, (s) => {
                s.docChanges().forEach((c) => c.type === 'added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data())));
            });
        };

        // JOIN ROOM ACTION
        window.joinRoom = async (id) => {
            await initMicOnly();
            document.getElementById('call-interface').classList.remove('hidden');
            document.getElementById('remote-avatar').src = getAvatar(id);

            const callDoc = doc(db, 'calls', id);
            const offerCandidates = collection(callDoc, 'offerCandidates');
            const answerCandidates = collection(callDoc, 'answerCandidates');

            pc.onicecandidate = (e) => e.candidate && addDoc(answerCandidates, e.candidate.toJSON());

            const callData = (await getDoc(callDoc)).data();
            document.getElementById('ui-topic').innerText = callData.topic;

            await pc.setRemoteDescription(new RTCSessionDescription(callData.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            await updateDoc(callDoc, { answer: { type: answer.type, sdp: answer.sdp } });

            onSnapshot(offerCandidates, (s) => {
                s.docChanges().forEach((c) => c.type === 'added' && pc.addIceCandidate(new RTCIceCandidate(c.doc.data())));
            });
        };

        // UI TOGGLES
        document.getElementById('toggle-video').onclick = () => {
            const videoTrack = localStream.getVideoTracks()[0];
            videoTrack.enabled = !videoTrack.enabled;
            document.getElementById('localVideo').classList.toggle('hidden');
            document.getElementById('toggle-video').classList.toggle('text-indigo-400');
        };

        document.getElementById('leave-btn').onclick = () => location.reload();
    </script>
</body>
</html>
