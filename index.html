<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darbhanga Sikho | Ultimate Live Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --accent: #3b82f6; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .ds-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 24px; transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        .ds-card:hover { border-color: var(--accent); transform: translateY(-4px); }
        
        #video-grid { display: grid; gap: 15px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); padding: 20px; }
        .video-box { position: relative; background: #000; border-radius: 20px; overflow: hidden; aspect-ratio: 16/9; border: 2px solid #1e293b; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        
        .avatar-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; items: center; justify-content: center; background: #0f172a; z-index: 10; }
        .hidden { display: none !important; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 50px; z-index: 1000; font-weight: 600; animation: popUp 0.3s ease; }
        @keyframes popUp { from { bottom: 0; opacity: 0; } to { bottom: 20px; opacity: 1; } }
    </style>
</head>
<body>

    <div id="toast-bin"></div>

    <!-- NAVBAR -->
    <header class="fixed top-0 w-full z-50 glass">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black shadow-lg">DS</div>
                <h1 class="text-xl font-extrabold tracking-tighter">DARBHANGA <span class="text-blue-500">SIKHO</span></h1>
            </div>

            <div class="flex items-center gap-4">
                <button id="nav-create-btn" class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-full font-bold text-sm transition-all">Start Session</button>
                <div id="auth-ui-guest">
                    <button onclick="openAuth('login')" class="px-5 py-2 text-sm font-bold border border-white/10 rounded-full hover:bg-white/5">Sign In</button>
                </div>
                <div id="auth-ui-user" class="hidden flex items-center gap-3 bg-slate-900 p-1 pr-4 rounded-full border border-slate-800">
                    <img id="nav-user-img" class="w-10 h-10 rounded-full object-cover border-2 border-blue-500">
                    <button onclick="handleLogout()" class="text-xs text-red-500 font-bold uppercase">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <!-- HERO / ROOM LIST -->
    <main class="max-w-7xl mx-auto px-6 pt-32 pb-20">
        <div class="mb-12">
            <h2 class="text-4xl font-black mb-2">Live Language Rooms</h2>
            <p class="text-slate-400">Join a room to start practicing. You must be logged in to participate.</p>
        </div>
        <div id="room-list-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Rooms dynamically injected here -->
        </div>
    </main>

    <!-- AUTH MODAL (Login/Signup) -->
    <div id="modal-auth" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-black/90 backdrop-blur-md">
        <div class="bg-slate-900 w-full max-w-md rounded-[32px] p-8 border border-slate-800">
            <h3 id="auth-title" class="text-2xl font-bold mb-6 text-center text-blue-400">Welcome Back</h3>
            <div class="space-y-4 mb-6">
                <input id="auth-name" type="text" placeholder="Your Full Name" class="hidden w-full bg-black border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500">
                <input id="auth-email" type="email" placeholder="Email Address" class="w-full bg-black border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500">
                <input id="auth-pass" type="password" placeholder="Password" class="w-full bg-black border border-slate-700 p-4 rounded-2xl outline-none focus:border-blue-500">
            </div>
            <button id="auth-action-btn" class="w-full py-4 bg-blue-600 rounded-2xl font-bold mb-4 shadow-lg hover:bg-blue-500">Proceed</button>
            <button id="auth-google-btn" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl font-bold flex items-center justify-center gap-3 hover:bg-white/10">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5"> Google Login
            </button>
            <p id="auth-toggle-text" class="mt-6 text-center text-sm text-slate-400 cursor-pointer hover:text-white">Don't have an account? Sign Up</p>
            <button onclick="closeModals()" class="w-full mt-4 text-slate-600 text-xs uppercase tracking-widest">Close</button>
        </div>
    </div>

    <!-- CREATE ROOM MODAL -->
    <div id="modal-create" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-6 bg-black/80">
        <div class="bg-slate-900 w-full max-w-md p-8 rounded-[32px] border border-slate-800">
            <h3 class="text-2xl font-bold mb-6 text-blue-400">Host New Room</h3>
            <div class="space-y-4">
                <input id="inp-room-topic" type="text" placeholder="Room Topic (e.g. IELTS Practice)" class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-white outline-none">
                <select id="inp-room-lang" class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-white">
                    <option>English</option><option>Hindi</option><option>Maithili</option>
                </select>
                <select id="inp-room-limit" class="w-full bg-black border border-slate-700 p-4 rounded-2xl text-white">
                    <option value="2">2 People</option><option value="4" selected>4 People</option><option value="6">6 People</option>
                </select>
                <button id="confirm-create-btn" class="w-full py-4 bg-blue-600 rounded-2xl font-bold hover:bg-blue-500">Go Live Now</button>
                <button onclick="closeModals()" class="w-full text-slate-500 text-sm">Cancel</button>
            </div>
        </div>
    </div>

    <!-- VIDEO CALL OVERLAY -->
    <div id="call-screen" class="fixed inset-0 z-[200] hidden bg-black flex flex-col lg:flex-row">
        <div class="flex-1 flex flex-col h-full relative">
            <div class="p-4 flex justify-between items-center glass absolute top-0 w-full z-20">
                <h4 id="display-topic" class="font-bold text-blue-400">Live Session</h4>
                <button onclick="leaveRoom()" class="bg-red-600 px-6 py-2 rounded-full font-bold text-xs uppercase tracking-widest">End Session</button>
            </div>
            
            <div id="video-grid" class="flex-1 mt-20 overflow-y-auto">
                <div class="video-box" id="local-box">
                    <video id="localVideo" class="mirror" autoplay playsinline muted></video>
                    <div id="local-avatar" class="avatar-overlay">
                        <img id="local-img" class="w-24 h-24 rounded-full border-4 border-blue-500 mb-2">
                        <span class="text-[10px] text-slate-500 font-bold uppercase">You (Camera Off)</span>
                    </div>
                </div>
            </div>

            <div class="p-6 bg-slate-950 flex justify-center gap-6 border-t border-white/5">
                <button id="toggle-mic" class="w-14 h-14 rounded-2xl bg-blue-600 flex items-center justify-center">Mic</button>
                <button id="toggle-cam" class="w-14 h-14 rounded-2xl bg-slate-800 flex items-center justify-center">Cam</button>
            </div>
        </div>

        <div class="w-full lg:w-96 bg-slate-950 border-l border-white/5 flex flex-col h-full">
            <div class="p-4 border-b border-white/5 font-black text-xs text-slate-500 uppercase tracking-widest">Chat</div>
            <div id="chat-msgs" class="flex-1 p-4 overflow-y-auto space-y-3"></div>
            <form id="chat-form" class="p-4 bg-black flex gap-2">
                <input id="chat-input" type="text" placeholder="Message..." class="flex-1 bg-slate-900 p-3 rounded-xl outline-none text-sm border border-slate-800">
                <button class="bg-blue-600 px-4 rounded-xl font-bold">Send</button>
            </form>
        </div>
    </div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, updateDoc, setDoc, query, orderBy, limit, serverTimestamp, deleteDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKlo2eBKCQAeC3PkRz45ntdhYjH9YS3cE",
            authDomain: "eng4world-f78a2.firebaseapp.com",
            databaseURL: "https://eng4world-f78a2-default-rtdb.firebaseio.com",
            projectId: "eng4world-f78a2",
            storageBucket: "eng4world-f78a2.firebasestorage.app",
            messagingSenderId: "914297244703",
            appId: "1:914297244703:web:4f6530b891dfc06fb9192a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const gProvider = new GoogleAuthProvider();
        const iceServers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        let currentUser = null;
        let localStream = null;
        let activeRoomId = null;
        let peers = {};
        let authMode = 'login';

        // --- AUTH MODULE ---
        onAuthStateChanged(auth, (u) => {
            currentUser = u;
            if (u) {
                document.getElementById('auth-ui-guest').classList.add('hidden');
                document.getElementById('auth-ui-user').classList.remove('hidden');
                const pfp = u.photoURL || `https://api.dicebear.com/7.x/adventurer/svg?seed=${u.uid}`;
                document.getElementById('nav-user-img').src = pfp;
                document.getElementById('local-img').src = pfp;
                closeModals();
            } else {
                document.getElementById('auth-ui-guest').classList.remove('hidden');
                document.getElementById('auth-ui-user').classList.add('hidden');
            }
        });

        window.openAuth = (mode) => {
            authMode = mode;
            document.getElementById('modal-auth').classList.remove('hidden');
            document.getElementById('auth-title').innerText = mode === 'login' ? 'Welcome Back' : 'Create Account';
            document.getElementById('auth-name').classList.toggle('hidden', mode === 'login');
            document.getElementById('auth-toggle-text').innerText = mode === 'login' ? "Don't have an account? Sign Up" : "Have an account? Login";
        };

        document.getElementById('auth-toggle-text').onclick = () => {
            openAuth(authMode === 'login' ? 'signup' : 'login');
        };

        document.getElementById('auth-action-btn').onclick = async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const name = document.getElementById('auth-name').value;
            try {
                if (authMode === 'login') {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(res.user, { displayName: name });
                    location.reload();
                }
            } catch (e) { toast(e.message, 'error'); }
        };

        document.getElementById('auth-google-btn').onclick = async () => {
            try { await signInWithPopup(auth, gProvider); } catch (e) { toast(e.message, 'error'); }
        };

        window.handleLogout = () => signOut(auth);

        // --- ROOM LISTING ---
        onSnapshot(collection(db, 'rooms'), (snap) => {
            const container = document.getElementById('room-list-container');
            container.innerHTML = '';
            snap.forEach(d => {
                const data = d.data();
                if (!data.participants || data.participants.length === 0) return;
                const card = document.createElement('div');
                card.className = "ds-card p-6";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <img src="${data.creatorAvatar}" class="w-12 h-12 rounded-full border-2 border-blue-500">
                        <span class="text-[10px] font-bold bg-blue-500/10 text-blue-400 px-3 py-1 rounded-full uppercase">${data.lang}</span>
                    </div>
                    <h3 class="text-xl font-bold mb-2">${data.topic}</h3>
                    <p class="text-slate-500 text-sm mb-6">${data.participants.length} / ${data.limit} Joined</p>
                    <button onclick="joinRoom('${d.id}')" class="mt-auto w-full py-4 bg-white text-black font-bold rounded-2xl hover:bg-blue-600 hover:text-white transition-all">Join Talk</button>
                `;
                container.appendChild(card);
            });
        });

        // --- ROOM CREATION & JOINING ---
        document.getElementById('nav-create-btn').onclick = () => {
            if (!currentUser) return openAuth('login');
            document.getElementById('modal-create').classList.remove('hidden');
        };

        document.getElementById('confirm-create-btn').onclick = async () => {
            const topic = document.getElementById('inp-room-topic').value || "Free Talk";
            const lang = document.getElementById('inp-room-lang').value;
            const limitVal = parseInt(document.getElementById('inp-room-limit').value);
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                localStream.getVideoTracks()[0].enabled = false;

                const roomRef = await addDoc(collection(db, 'rooms'), {
                    topic, lang, limit: limitVal,
                    creator: currentUser.uid,
                    creatorAvatar: currentUser.photoURL || `https://api.dicebear.com/7.x/adventurer/svg?seed=${currentUser.uid}`,
                    participants: [currentUser.uid],
                    createdAt: serverTimestamp()
                });
                activeRoomId = roomRef.id;
                startSession(topic);
            } catch (e) { toast("Enable Camera/Mic to start", "error"); }
        };

        window.joinRoom = async (id) => {
            if (!currentUser) return openAuth('login');
            try {
                const rRef = doc(db, 'rooms', id);
                const snap = await getDoc(rRef);
                if (snap.data().participants.length >= snap.data().limit) return toast("Room full", "error");

                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                localStream.getVideoTracks()[0].enabled = false;

                activeRoomId = id;
                await updateDoc(rRef, { participants: arrayUnion(currentUser.uid) });
                startSession(snap.data().topic);
            } catch (e) { toast("Access Denied", "error"); }
        };

        function startSession(topic) {
            closeModals();
            document.getElementById('call-screen').classList.remove('hidden');
            document.getElementById('display-topic').innerText = topic;
            initWebRTC();
            initChat();
        }

        // --- WEBRTC MESH ---
        function initWebRTC() {
            onSnapshot(doc(db, 'rooms', activeRoomId), (snap) => {
                const data = snap.data();
                if (!data) return;
                data.participants.forEach(pId => {
                    if (pId !== currentUser.uid && !peers[pId]) {
                        if (currentUser.uid < pId) setupPeer(pId, true);
                    }
                });
            });

            onSnapshot(collection(db, `rooms/${activeRoomId}/signals`), (snap) => {
                snap.docChanges().forEach(async change => {
                    if (change.type === 'added') {
                        const sig = change.doc.data();
                        if (sig.to === currentUser.uid) handleSignal(sig);
                    }
                });
            });
        }

        async function setupPeer(targetId, isOfferer) {
            if (peers[targetId]) return;
            const pc = new RTCPeerConnection(iceServers);
            peers[targetId] = pc;
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

            pc.onicecandidate = (e) => {
                if (e.candidate) addDoc(collection(db, `rooms/${activeRoomId}/signals`), { type: 'ice', from: currentUser.uid, to: targetId, cand: e.candidate.toJSON() });
            };

            pc.ontrack = (e) => {
                if (document.getElementById(`vid-${targetId}`)) return;
                const box = document.createElement('div');
                box.className = "video-box";
                box.id = `box-${targetId}`;
                box.innerHTML = `<video id="vid-${targetId}" autoplay playsinline></video>
                    <div id="av-${targetId}" class="avatar-overlay">
                        <img class="w-20 h-20 rounded-full mb-2" src="https://api.dicebear.com/7.x/adventurer/svg?seed=${targetId}">
                        <span class="text-[8px] text-slate-500 font-bold uppercase">Partner</span>
                    </div>`;
                document.getElementById('video-grid').appendChild(box);
                document.getElementById(`vid-${targetId}`).srcObject = e.streams[0];
                const vt = e.streams[0].getVideoTracks()[0];
                if(vt) {
                    vt.onmute = () => document.getElementById(`av-${targetId}`).classList.remove('hidden');
                    vt.onunmute = () => document.getElementById(`av-${targetId}`).classList.add('hidden');
                }
            };

            if (isOfferer) {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                await addDoc(collection(db, `rooms/${activeRoomId}/signals`), { type: 'offer', from: currentUser.uid, to: targetId, sdp: offer.sdp });
            }
        }

        async function handleSignal(sig) {
            if (!peers[sig.from]) await setupPeer(sig.from, false);
            const pc = peers[sig.from];
            if (sig.type === 'offer') {
                await pc.setRemoteDescription(new RTCSessionDescription(sig));
                const ans = await pc.createAnswer();
                await pc.setLocalDescription(ans);
                await addDoc(collection(db, `rooms/${activeRoomId}/signals`), { type: 'answer', from: currentUser.uid, to: sig.from, sdp: ans.sdp });
            } else if (sig.type === 'answer') {
                await pc.setRemoteDescription(new RTCSessionDescription(sig));
            } else if (sig.type === 'ice') {
                await pc.addIceCandidate(new RTCIceCandidate(sig.cand));
            }
        }

        // --- CHAT MODULE ---
        function initChat() {
            const q = query(collection(db, `rooms/${activeRoomId}/chat`), orderBy('time', 'asc'));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('chat-msgs');
                box.innerHTML = '';
                snap.forEach(m => {
                    const d = m.data();
                    const el = document.createElement('div');
                    el.className = "p-3 bg-white/5 rounded-xl border-l-2 border-blue-500";
                    el.innerHTML = `<span class="block text-[10px] text-blue-400 font-bold">${d.name}</span><p class="text-sm">${d.text}</p>`;
                    box.appendChild(el);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;
            await addDoc(collection(db, `rooms/${activeRoomId}/chat`), { name: currentUser.displayName || "User", text: input.value, time: serverTimestamp() });
            input.value = '';
        };

        // --- UI UTILS ---
        window.leaveRoom = async () => {
            if (activeRoomId && currentUser) {
                await updateDoc(doc(db, 'rooms', activeRoomId), { participants: arrayRemove(currentUser.uid) });
            }
            location.reload();
        };

        window.closeModals = () => document.querySelectorAll('[id^="modal-"]').forEach(m => m.classList.add('hidden'));

        function toast(msg, type) {
            const el = document.createElement('div');
            el.className = `toast ${type === 'error' ? 'bg-red-600' : 'bg-blue-600'}`;
            el.innerText = msg;
            document.getElementById('toast-bin').appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        document.getElementById('toggle-mic').onclick = function() {
            const state = localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
            this.classList.toggle('bg-red-600', !state);
            this.innerText = state ? 'Mic' : 'Muted';
        };

        document.getElementById('toggle-cam').onclick = function() {
            const state = localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled;
            document.getElementById('local-avatar').classList.toggle('hidden', state);
            this.classList.toggle('bg-blue-600', state);
            this.innerText = state ? 'Cam On' : 'Cam Off';
        };
    </script>
</body>
</html>
