<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Darbhanga Sikho | Ultimate Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #020617; --accent: #3b82f6; --glass: rgba(15, 23, 42, 0.8); }
        body { font-family: 'Outfit', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        
        .glass { backdrop-filter: blur(16px); background: var(--glass); border: 1px solid rgba(255,255,255,0.1); }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; }
        
        /* Video Grid Responsive */
        #video-grid { 
            display: grid; 
            gap: 12px; 
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); 
            width: 100%; 
            padding: 10px;
        }
        @media (min-width: 768px) { #video-grid { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); padding: 20px; } }
        
        .video-container { position: relative; border-radius: 20px; overflow: hidden; aspect-ratio: 1/1; background: #000; border: 2px solid rgba(255,255,255,0.1); }
        @media (min-width: 768px) { .video-container { aspect-ratio: 16/9; } }
        
        video { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); }
        
        .avatar-box { position: absolute; inset: 0; display: flex; flex-direction: column; items: center; justify-content: center; background: #0f172a; z-index: 5; }
        
        /* Navigation & Routing */
        .page-view { display: none; min-height: 100vh; padding-top: 80px; }
        .page-view.active { display: block; }

        /* Mobile Chat Sidebar */
        #chat-sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 300; }
        @media (max-width: 1024px) {
            #chat-sidebar { position: fixed; bottom: 0; left: 0; right: 0; height: 70vh; transform: translateY(100%); border-radius: 30px 30px 0 0; }
            #chat-sidebar.open { transform: translateY(0); }
        }

        .toast { position: fixed; top: 90px; right: 20px; padding: 12px 20px; border-radius: 12px; z-index: 1000; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <!-- SHARED HEADER -->
    <header class="fixed top-0 w-full z-[400] glass h-20 flex items-center px-6 justify-between border-b border-white/10">
        <div class="flex items-center gap-3 cursor-pointer" onclick="go('#home')">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black">DS</div>
            <h1 class="font-extrabold text-xl tracking-tighter">DARBHANGA <span class="text-blue-500">SIKHO</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="auth-controls" class="flex gap-2">
                <!-- Dynamic Auth Buttons -->
            </div>
        </div>
    </header>

    <div id="toast-bin"></div>

    <!-- HOME PAGE -->
    <section id="view-home" class="page-view container mx-auto px-6">
        <div class="py-12 text-center md:text-left">
            <h2 class="text-5xl md:text-7xl font-black mb-4">Talk Your Way to <span class="text-blue-500">Fluency.</span></h2>
            <p class="text-slate-400 text-lg mb-8 max-w-xl">The first language exchange platform built for Darbhanga. Practice English, Hindi, or Maithili live.</p>
            <button onclick="go('#room-create')" class="bg-blue-600 px-8 py-4 rounded-2xl font-bold text-lg hover:scale-105 transition-all">Start Session</button>
        </div>
        <div id="room-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-20">
            <!-- Room Cards -->
        </div>
    </section>

    <!-- AUTH PAGE -->
    <section id="view-auth" class="page-view container mx-auto px-6 flex items-center justify-center">
        <div class="glass-card w-full max-w-md p-8">
            <h3 id="auth-title" class="text-3xl font-bold mb-6">Welcome back</h3>
            <div class="space-y-4 mb-6">
                <input id="auth-name" type="text" placeholder="Full Name" class="hidden w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500">
                <input id="auth-email" type="email" placeholder="Email" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500">
                <input id="auth-pass" type="password" placeholder="Password" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none focus:border-blue-500">
            </div>
            <button id="btn-auth-submit" class="w-full py-4 bg-blue-600 rounded-2xl font-bold mb-4 shadow-lg">Continue</button>
            <button id="btn-google" class="w-full py-4 bg-white text-black rounded-2xl font-bold flex items-center justify-center gap-2 mb-6">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="currentColor" d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/></svg>
                Google
            </button>
            <p id="auth-switch" class="text-center text-sm text-slate-400 cursor-pointer">Need an account? <span class="text-blue-500">Sign Up</span></p>
        </div>
    </section>

    <!-- CREATE ROOM PAGE -->
    <section id="view-room-create" class="page-view container mx-auto px-6 flex items-center justify-center">
        <div class="glass-card w-full max-w-md p-8">
            <h3 class="text-2xl font-bold mb-6">Room Settings</h3>
            <div class="space-y-4">
                <input id="room-topic" type="text" placeholder="Topic: e.g. Daily Routine" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl outline-none">
                <select id="room-lang" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl">
                    <option>English</option><option>Hindi</option><option>Maithili</option>
                </select>
                <select id="room-limit" class="w-full bg-black/40 border border-white/10 p-4 rounded-2xl">
                    <option value="2">2 People</option><option value="4" selected>4 People</option><option value="8">8 People</option>
                </select>
                <button id="btn-create-now" class="w-full py-4 bg-blue-600 rounded-2xl font-bold">Launch Room</button>
            </div>
        </div>
    </section>

    <!-- LIVE SESSION ROOM -->
    <section id="view-session" class="fixed inset-0 z-[500] hidden bg-black flex flex-col lg:flex-row overflow-hidden">
        <div class="flex-1 flex flex-col h-full relative">
            <!-- Session Header -->
            <div class="p-4 glass flex justify-between items-center z-20">
                <div>
                    <h4 id="sess-topic" class="font-bold text-blue-400 text-sm md:text-base">Practice Session</h4>
                    <p id="sess-count" class="text-[10px] uppercase font-bold text-slate-500 tracking-widest">1 Member Online</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="copyLink()" class="p-2 bg-white/10 rounded-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path></svg></button>
                    <button onclick="leaveSession()" class="bg-red-600 px-4 py-2 rounded-xl font-bold text-xs">EXIT</button>
                </div>
            </div>

            <!-- Video Grid -->
            <div id="video-grid" class="flex-1 overflow-y-auto">
                <div class="video-container" id="local-box">
                    <video id="localVideo" class="mirror" autoplay playsinline muted></video>
                    <div id="local-avatar" class="avatar-box">
                        <img id="my-avatar-img" class="w-24 h-24 rounded-full border-4 border-blue-500">
                        <span class="mt-4 text-[10px] font-black opacity-50">YOU (MUTED)</span>
                    </div>
                </div>
            </div>

            <!-- Floating Mobile Toolbar -->
            <div class="p-4 bg-slate-900/90 border-t border-white/10 flex justify-center gap-6 lg:gap-10">
                <button id="btn-mic" class="w-14 h-14 bg-blue-600 rounded-full flex items-center justify-center shadow-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg></button>
                <button id="btn-cam" class="w-14 h-14 bg-slate-800 rounded-full flex items-center justify-center shadow-lg"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></button>
                <button onclick="toggleChat()" class="w-14 h-14 bg-slate-800 rounded-full flex items-center justify-center shadow-lg lg:hidden"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg></button>
            </div>
        </div>

        <!-- Session Chat -->
        <div id="chat-sidebar" class="lg:w-96 glass flex flex-col h-full">
            <div class="p-5 border-b border-white/10 flex justify-between items-center">
                <span class="font-bold text-xs uppercase tracking-tighter opacity-50">Room Messages</span>
                <button onclick="toggleChat()" class="lg:hidden text-slate-500 font-bold">CLOSE</button>
            </div>
            <div id="sess-chat-msgs" class="flex-1 p-4 overflow-y-auto space-y-4"></div>
            <form id="sess-chat-form" class="p-4 bg-black flex gap-2">
                <input id="sess-chat-input" type="text" placeholder="Type a message..." class="flex-1 bg-white/5 border border-white/10 p-3 rounded-xl outline-none text-sm">
                <button class="bg-blue-600 p-3 rounded-xl">➔</button>
            </form>
        </div>
    </section>

    <!-- CORE LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, doc, getDoc, updateDoc, setDoc, query, orderBy, limit, serverTimestamp, deleteDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAKlo2eBKCQAeC3PkRz45ntdhYjH9YS3cE",
            authDomain: "eng4world-f78a2.firebaseapp.com",
            databaseURL: "https://eng4world-f78a2-default-rtdb.firebaseio.com",
            projectId: "eng4world-f78a2",
            storageBucket: "eng4world-f78a2.firebasestorage.app",
            messagingSenderId: "914297244703",
            appId: "1:914297244703:web:4f6530b891dfc06fb9192a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const gProvider = new GoogleAuthProvider();
        const servers = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        let currentUser = null;
        let localStream = null;
        let activeRoomId = null;
        let peers = {};
        let authMode = 'login';

        // --- ROUTER & NAVIGATION ---
        function go(hash) {
            window.location.hash = hash;
            const route = hash.split('/')[0];
            document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
            document.getElementById('view-session').classList.add('hidden');

            if (route === '#home' || hash === '') document.getElementById('view-home').classList.add('active');
            else if (route === '#auth') document.getElementById('view-auth').classList.add('active');
            else if (route === '#room-create') document.getElementById('view-room-create').classList.add('active');
            else if (route === '#room') handleRoomRoute(hash.split('/')[1]);
        }

        window.go = go;
        window.addEventListener('hashchange', () => go(window.location.hash));

        // --- AUTH MODULE ---
        onAuthStateChanged(auth, (u) => {
            currentUser = u;
            const ctrl = document.getElementById('auth-controls');
            if (u) {
                const pfp = u.photoURL || `https://api.dicebear.com/7.x/adventurer/svg?seed=${u.uid}`;
                ctrl.innerHTML = `<img src="${pfp}" class="w-10 h-10 rounded-full border border-blue-500"><button onclick="logout()" class="text-xs font-bold text-red-500 ml-2">OUT</button>`;
                document.getElementById('my-avatar-img').src = pfp;
                if(window.location.hash.startsWith('#auth')) go('#home');
            } else {
                ctrl.innerHTML = `<button onclick="go('#auth')" class="bg-blue-600 px-6 py-2 rounded-xl font-bold text-sm">Join Us</button>`;
            }
        });

        document.getElementById('auth-switch').onclick = () => {
            authMode = authMode === 'login' ? 'signup' : 'login';
            document.getElementById('auth-title').innerText = authMode === 'login' ? 'Welcome Back' : 'Join the Club';
            document.getElementById('auth-name').classList.toggle('hidden', authMode === 'login');
            document.getElementById('auth-switch').innerHTML = authMode === 'login' ? "Need an account? <span class='text-blue-500'>Sign Up</span>" : "Have an account? <span class='text-blue-500'>Login</span>";
        };

        document.getElementById('btn-auth-submit').onclick = async () => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-pass').value;
            try {
                if (authMode === 'login') await signInWithEmailAndPassword(auth, e, p);
                else {
                    const res = await createUserWithEmailAndPassword(auth, e, p);
                    await updateProfile(res.user, { displayName: document.getElementById('auth-name').value });
                    location.reload();
                }
            } catch (err) { toast(err.message, 'error'); }
        };

        document.getElementById('btn-google').onclick = () => signInWithPopup(auth, gProvider);
        window.logout = () => signOut(auth);

        // --- ROOMS LISTING ---
        onSnapshot(collection(db, 'rooms'), (snap) => {
            const list = document.getElementById('room-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const r = d.data();
                if(!r.participants || r.participants.length === 0) return;
                const el = document.createElement('div');
                el.className = "glass-card p-6 flex flex-col";
                el.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <img src="${r.creatorAvatar}" class="w-12 h-12 rounded-xl border border-blue-500">
                        <span class="bg-blue-500/10 text-blue-500 text-[10px] font-bold px-3 py-1 rounded-lg uppercase tracking-widest">${r.lang}</span>
                    </div>
                    <h4 class="text-xl font-bold mb-1">${r.topic}</h4>
                    <p class="text-xs text-slate-500 mb-6 font-bold uppercase tracking-tighter">${r.participants.length} Learners Joined</p>
                    <button onclick="go('#room/${d.id}')" class="mt-auto w-full py-4 bg-white/5 hover:bg-blue-600 text-white font-bold rounded-2xl border border-white/10 transition-all">Join Live Talk</button>
                `;
                list.appendChild(el);
            });
        });

        // --- ROOM SESSION LOGIC ---
        document.getElementById('btn-create-now').onclick = async () => {
            if (!currentUser) return go('#auth');
            const topic = document.getElementById('room-topic').value || "English Talk";
            const lang = document.getElementById('room-lang').value;
            const limitVal = parseInt(document.getElementById('room-limit').value);

            try {
                const ref = await addDoc(collection(db, 'rooms'), {
                    topic, lang, limit: limitVal,
                    creator: currentUser.uid,
                    creatorAvatar: currentUser.photoURL || `https://api.dicebear.com/7.x/adventurer/svg?seed=${currentUser.uid}`,
                    participants: [currentUser.uid],
                    createdAt: serverTimestamp()
                });
                go(`#room/${ref.id}`);
            } catch (err) { toast(err.message, 'error'); }
        };

        async function handleRoomRoute(id) {
            if (!currentUser) return go('#auth');
            try {
                const rRef = doc(db, 'rooms', id);
                const rSnap = await getDoc(rRef);
                if (!rSnap.exists()) return go('#home');
                
                if (rSnap.data().participants.length >= rSnap.data().limit && !rSnap.data().participants.includes(currentUser.uid)) {
                    toast("Room full!", "error");
                    return go('#home');
                }

                activeRoomId = id;
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('localVideo').srcObject = localStream;
                localStream.getVideoTracks()[0].enabled = false;

                if (!rSnap.data().participants.includes(currentUser.uid)) {
                    await updateDoc(rRef, { participants: arrayUnion(currentUser.uid) });
                }

                document.getElementById('view-session').classList.remove('hidden');
                document.getElementById('sess-topic').innerText = rSnap.data().topic;
                startWebRTC();
                startChat();
            } catch (err) { toast("Enable Mic & Camera to join", "error"); go('#home'); }
        }

        // --- WEBRTC CORE (The Fix) ---
        function startWebRTC() {
            onSnapshot(doc(db, 'rooms', activeRoomId), (snap) => {
                const data = snap.data();
                if (!data) return;
                document.getElementById('sess-count').innerText = `${data.participants.length} Members Online`;
                data.participants.forEach(pId => {
                    if (pId !== currentUser.uid && !peers[pId]) {
                        if (currentUser.uid < pId) setupPeer(pId, true);
                    }
                });
            });

            onSnapshot(collection(db, `rooms/${activeRoomId}/signals`), (snap) => {
                snap.docChanges().forEach(async change => {
                    if (change.type === 'added') {
                        const sig = change.doc.data();
                        if (sig.to === currentUser.uid) handleIncomingSignal(sig);
                    }
                });
            });
        }

        async function setupPeer(targetId, isOfferer) {
            if (peers[targetId]) return;
            const pc = new RTCPeerConnection(servers);
            peers[targetId] = pc;
            localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

            pc.onicecandidate = (e) => {
                if (e.candidate) addDoc(collection(db, `rooms/${activeRoomId}/signals`), { type: 'ice', from: currentUser.uid, to: targetId, cand: e.candidate.toJSON() });
            };

            pc.ontrack = (e) => {
                if (document.getElementById(`vid-${targetId}`)) return;
                const container = document.createElement('div');
                container.className = "video-container";
                container.id = `box-${targetId}`;
                container.innerHTML = `
                    <video id="vid-${targetId}" autoplay playsinline></video>
                    <div id="av-${targetId}" class="avatar-box">
                        <img class="w-20 h-20 rounded-full border-2 border-white/20 shadow-2xl" src="https://api.dicebear.com/7.x/adventurer/svg?seed=${targetId}">
                        <span class="mt-4 text-[8px] font-black opacity-40 uppercase">Learning Partner</span>
                    </div>`;
                document.getElementById('video-grid').appendChild(container);
                document.getElementById(`vid-${targetId}`).srcObject = e.streams[0];
                
                const remoteVideoTrack = e.streams[0].getVideoTracks()[0];
                if(remoteVideoTrack) {
                    const sync = () => document.getElementById(`av-${targetId}`).style.display = remoteVideoTrack.enabled ? 'none' : 'flex';
                    remoteVideoTrack.onmute = sync; remoteVideoTrack.onunmute = sync;
                    sync();
                }
            };

            if (isOfferer) {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                await addDoc(collection(db, `rooms/${activeRoomId}/signals`), { type: 'offer', from: currentUser.uid, to: targetId, sdp: offer.sdp });
            }
        }

        async function handleIncomingSignal(sig) {
            if (!peers[sig.from]) await setupPeer(sig.from, false);
            const pc = peers[sig.from];
            try {
                if (sig.type === 'offer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(sig));
                    const ans = await pc.createAnswer();
                    await pc.setLocalDescription(ans);
                    await addDoc(collection(db, `rooms/${activeRoomId}/signals`), { type: 'answer', from: currentUser.uid, to: sig.from, sdp: ans.sdp });
                } else if (sig.type === 'answer') {
                    await pc.setRemoteDescription(new RTCSessionDescription(sig));
                } else if (sig.type === 'ice') {
                    await pc.addIceCandidate(new RTCIceCandidate(sig.cand));
                }
            } catch (err) { console.warn(err); }
        }

        // --- CHAT SYSTEM ---
        function startChat() {
            const q = query(collection(db, `rooms/${activeRoomId}/chat`), orderBy('time', 'asc'));
            onSnapshot(q, (snap) => {
                const box = document.getElementById('sess-chat-msgs');
                box.innerHTML = '';
                snap.forEach(m => {
                    const d = m.data();
                    const el = document.createElement('div');
                    el.className = "p-3 bg-white/5 rounded-2xl border-l-2 border-blue-500";
                    el.innerHTML = `<span class="block text-[10px] font-bold text-blue-500 uppercase mb-1">${d.name}</span><p class="text-sm">${d.text}</p>`;
                    box.appendChild(el);
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        document.getElementById('sess-chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('sess-chat-input');
            if (!input.value.trim()) return;
            await addDoc(collection(db, `rooms/${activeRoomId}/chat`), { name: currentUser.displayName || "Learner", text: input.value, time: serverTimestamp() });
            input.value = '';
        };

        // --- UTILS ---
        window.leaveSession = async () => {
            if (activeRoomId && currentUser) {
                await updateDoc(doc(db, 'rooms', activeRoomId), { participants: arrayRemove(currentUser.uid) });
            }
            location.href = '#home';
            location.reload();
        };

        window.copyLink = () => {
            navigator.clipboard.writeText(window.location.href);
            toast("Link Copied!", "success");
        };

        window.toggleChat = () => document.getElementById('chat-sidebar').classList.toggle('open');

        function toast(msg, type) {
            const el = document.createElement('div');
            el.className = `toast font-bold shadow-2xl ${type === 'error' ? 'bg-red-600' : 'bg-blue-600'}`;
            el.innerText = msg;
            document.getElementById('toast-bin').appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        document.getElementById('btn-mic').onclick = function() {
            const s = localStream.getAudioTracks()[0].enabled = !localStream.getAudioTracks()[0].enabled;
            this.classList.toggle('bg-red-600', !s);
            this.classList.toggle('bg-blue-600', s);
        };

        document.getElementById('btn-cam').onclick = function() {
            const s = localStream.getVideoTracks()[0].enabled = !localStream.getVideoTracks()[0].enabled;
            document.getElementById('local-avatar').style.display = s ? 'none' : 'flex';
            this.classList.toggle('bg-blue-600', s);
            this.classList.toggle('bg-slate-800', !s);
        };

        // Init
        go(window.location.hash);
    </script>
</body>
</html>
